name: PowerMeterApp
options:
  bundleIdPrefix: com.powermeter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
targets:
  PowerMeterApp:
    type: application
    platform: iOS
    sources:
      - path: PowerMeterApp
    settings:
      base:
        INFOPLIST_FILE: PowerMeterApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PowerMeterApp/PowerMeterApp.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.powermeter.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: PowerMeterApp/PowerMeterApp.entitlements
